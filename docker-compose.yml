# =============================================================================
# Synergine App — Infrastructure Layer
# =============================================================================
# Runtime: Colima (preferred) or Docker Desktop
#   colima start --cpu 4 --memory 8 --disk 60
#
# Usage:
#   Core only:     docker compose up -d
#   + Search:      docker compose --profile search up -d
#   + Monitoring:  docker compose --profile monitoring up -d
#   + Dashboard:   docker compose --profile dashboard up -d
#   Full:          docker compose --profile search --profile monitoring --profile dashboard up -d
#   Stop:          docker compose --profile search --profile monitoring --profile dashboard down
# =============================================================================

name: synergine

networks:
  synergine:
    name: synergine
    driver: bridge

volumes:
  surrealdb-data:
  dragonfly-data:
  nats-data:
  meilisearch-data:
  caddy-data:
  caddy-config:
  langfuse-data:
  uptime-kuma-data:

services:

  # ===========================================================================
  # CORE — always starts
  # ===========================================================================

  # SurrealDB 3.0 — Multi-model DB (graph + vector + doc + FTS)
  surrealdb:
    image: surrealdb/surrealdb:v2.3.3
    container_name: synergine-surrealdb
    restart: unless-stopped
    user: root
    command: >
      start --log info
      --user ${SURREALDB_USER:-root}
      --pass ${SURREALDB_PASS:-synergine}
      rocksdb:/data/surreal.db
    ports:
      - "${SURREALDB_PORT:-8000}:8000"
    volumes:
      - surrealdb-data:/data
    networks: [synergine]
    healthcheck:
      test: ["CMD", "/surreal", "is-ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  # Dragonfly — Redis-compatible cache (25x faster)
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.2
    container_name: synergine-dragonfly
    restart: unless-stopped
    command: >
      --maxmemory=1gb
      --cache_mode
      --requirepass=${DRAGONFLY_PASS:-synergine}
    ulimits:
      memlock: -1
    ports:
      - "127.0.0.1:6390:6379"
    volumes:
      - dragonfly-data:/data
    networks: [synergine]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DRAGONFLY_PASS:-synergine}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 1G

  # NATS — Cloud-native messaging with JetStream
  nats:
    image: nats:2.10-alpine
    container_name: synergine-nats
    restart: unless-stopped
    command: --jetstream --store_dir=/data
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    networks: [synergine]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ===========================================================================
  # SEARCH (profile: search)
  # ===========================================================================

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: synergine-meilisearch
    restart: unless-stopped
    profiles: [search]
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-synergine-meili-key}
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch-data:/meili_data
    networks: [synergine]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 800M

  # ===========================================================================
  # GATEWAY (profile: gateway)
  # ===========================================================================

  caddy:
    image: caddy:2.9-alpine
    container_name: synergine-caddy
    restart: unless-stopped
    profiles: [gateway]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [synergine]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ===========================================================================
  # MONITORING (profile: monitoring)
  # ===========================================================================

  # Langfuse — LLM observability for AI/Agent workflows
  langfuse-db:
    image: postgres:16-alpine
    container_name: synergine-langfuse-db
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASS:-langfuse-dev}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    networks: [synergine]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER:-langfuse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: synergine-langfuse
    restart: unless-stopped
    profiles: [monitoring]
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASS:-langfuse-dev}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-synergine-langfuse-secret-change-in-prod}
      NEXTAUTH_URL: http://localhost:3100
      SALT: ${LANGFUSE_SALT:-synergine-salt-change-in-prod}
    ports:
      - "${LANGFUSE_PORT:-3100}:3000"
    networks: [synergine]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Uptime Kuma — Unified monitoring dashboard
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: synergine-uptime-kuma
    restart: unless-stopped
    profiles: [monitoring]
    ports:
      - "${UPTIME_KUMA_PORT:-3200}:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks: [synergine]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ===========================================================================
  # DASHBOARD (profile: dashboard)
  # ===========================================================================

  # Dozzle — Real-time Docker container logs
  dozzle:
    image: amir20/dozzle:latest
    container_name: synergine-dozzle
    restart: unless-stopped
    profiles: [dashboard]
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [synergine]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
